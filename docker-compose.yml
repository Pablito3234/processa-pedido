version: "3.8"

services:

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: pedidosdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      retries: 10

  loja:
    build: .
    command: >
      sh -c "python manage.py migrate --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:5000 --workers 2"
    ports:
      - "5000:5000"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      DB_HOST: db
      POSTGRES_DB: pedidosdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      RABBIT_HOST: rabbitmq
      RABBIT_USER: guest
      RABBIT_PASS: guest
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  worker:
    build: .
    command: python manage.py run_worker
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      DB_HOST: db
      POSTGRES_DB: pedidosdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      RABBIT_HOST: rabbitmq
      RABBIT_USER: guest
      RABBIT_PASS: guest
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  painel:
    build: .
    command: gunicorn config.wsgi:application --bind 0.0.0.0:3000 --workers 2
    ports:
      - "3000:3000"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      DB_HOST: db
      POSTGRES_DB: pedidosdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
